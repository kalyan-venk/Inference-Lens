model: deberta-v3-small
base_model: microsoft/deberta-v3-small
checkpoint_output: models/deberta_checkpoint

training:
  learning_rate: 2.0e-5
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  warmup_ratio: 0.1
  weight_decay: 0.01
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: f1

note: >
  Training runs on Colab (free T4 GPU).
  Use notebooks/03_models/deberta_colab.ipynb.
  Download the checkpoint to models/deberta_checkpoint/ when done.
